<!DOCTYPE html>
<html>
<head>
  <title>Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: black;
      height: 100%;
      width: 100%;
    }
    img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      margin: auto;
      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img id="image" alt="Full Screen View" />
  <script>
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get("img");
    if (imgSrc) {
      document.getElementById("image").src = imgSrc;
    } else {
      document.body.innerHTML = "<h1 style='color:white;text-align:center;'>No image found</h1>";
    }
  </script>
</body>
</html>
